
<form [formGroup]="form" class="loginVista">
       <h1 id="header" >Sistema de gestión de proyectos</h1> 
    <div class="loginCont" id="main">
        <div class="loginInput">
            <h4>Usuario:</h4>            
            <input  pInputText id="nombre" type="text" placeholder="Nombre de usuario" formControlName="nombre" />
        </div>
        <div class="loginInput">
            <h4>Clave:</h4>
            <p-password  id="clave" formControlName="clave" [feedback]="false" autocomplete="off" placeholder="Clave de acceso"/>
        </div>
        
    </div>
    <p-button class="loginButton" label="Iniciar sesión" (click)="iniciarSesion()"/>
</form>
